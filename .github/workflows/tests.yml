name: Catalyst Data Release Contract

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install development requirements
        run: pip install -r requirements-dev.txt
      - name: Install Catalyst Data
        run: pip install -e .
      - name: Build deterministic artifacts
        run: python scripts/build_release.py
      - name: Verify generated files are committed
        run: git diff --exit-code
      - name: Run Python tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q -o addopts=''
      - name: Run release contract
        run: python scripts/check_release.py
